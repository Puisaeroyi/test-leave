# Production nginx: serves the Vite SPA and reverse-proxies API traffic
# to the backend container. Keeps everything on a single origin (no CORS).
# HTTPS on 443, plain HTTP on 80 redirects to HTTPS.

upstream backend_upstream {
    server backend:8000;
}

# Redirect any HTTP request to HTTPS on the public-facing port.
# Port is hardcoded here — if you change HTTPS_PORT in compose, update this too.
# $host strips the incoming port, so we append :8443 explicitly.
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/leave.crt;
    ssl_certificate_key /etc/nginx/certs/leave.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with long-lived caching (Vite hashes filenames)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend-served paths: proxy through so the browser talks to one origin
    location ~ ^/(api|admin|static|media|accounts|auth)/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # SPA fallback — let React Router handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
