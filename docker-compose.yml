services:
  db:
    image: postgres:16-alpine
    container_name: leave_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: leave_backend
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py createcachetable &&
        python manage.py collectstatic --noinput &&
        gunicorn --bind 0.0.0.0:8000 --workers 4 --threads 4 --timeout 60 --access-logfile - --error-logfile - backend.wsgi:application
      "
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DJANGO_SETTINGS_MODULE=backend.settings

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leave empty so the SPA uses same-origin requests (nginx proxies /api/).
        # Override only if the API lives on a different host.
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: leave_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
